name: Night Kyoteibiyori Results

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      hiduke:
        description: "YYYYMMDD (default: today in JST)"
        required: false
        type: string

jobs:
  run-night-results:
    runs-on: ubuntu-latest
    env:
      PICK_STATE_DIR: artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve HIDUKE
        run: |
          if [ -n "${{ github.event.inputs.hiduke }}" ]; then
            echo "HIDUKE=${{ github.event.inputs.hiduke }}" >> "$GITHUB_ENV"
          else
            echo "HIDUKE=$(TZ=Asia/Tokyo date +%Y%m%d)" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Download picked race state
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: picked-races-${{ env.HIDUKE }}
          path: ${{ env.PICK_STATE_DIR }}

      - name: Run result notifier
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HIDUKE: ${{ env.HIDUKE }}
          PICK_STATE_DIR: ${{ env.PICK_STATE_DIR }}
        run: npm run start:night
