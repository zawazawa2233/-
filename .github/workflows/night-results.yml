name: Night Kyoteibiyori Results

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      hiduke:
        description: "YYYYMMDD (default: today in JST)"
        required: false
        type: string

jobs:
  run-night-results:
    runs-on: ubuntu-latest
    env:
      PICK_STATE_DIR: artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve HIDUKE
        run: |
          if [ -n "${{ github.event.inputs.hiduke }}" ]; then
            echo "HIDUKE=${{ github.event.inputs.hiduke }}" >> "$GITHUB_ENV"
          else
            echo "HIDUKE=$(TZ=Asia/Tokyo date +%Y%m%d)" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Resolve source run for picked race state
        uses: actions/github-script@v7
        id: resolve-artifact-run
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const targetName = `picked-races-${process.env.HIDUKE}`;

            core.info(`Searching artifact: ${targetName}`);

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              {
                owner,
                repo,
                per_page: 100
              },
              (response) => response.data.artifacts
            );

            const match = artifacts
              .filter((artifact) => artifact.name === targetName && !artifact.expired)
              .sort((left, right) => new Date(right.created_at) - new Date(left.created_at))[0];

            if (!match) {
              core.warning(`Artifact not found: ${targetName}`);
              core.setOutput("found", "false");
              return;
            }

            core.setOutput("found", "true");
            core.setOutput("run_id", String(match.workflow_run.id));
            core.info(`Resolved workflow run: ${match.workflow_run.id}`);
        env:
          HIDUKE: ${{ env.HIDUKE }}

      - name: Download picked race state
        if: steps.resolve-artifact-run.outputs.found == 'true'
        uses: actions/download-artifact@v4
        with:
          name: picked-races-${{ env.HIDUKE }}
          path: ${{ env.PICK_STATE_DIR }}
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.resolve-artifact-run.outputs.run_id }}

      - name: Run result notifier
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HIDUKE: ${{ env.HIDUKE }}
          PICK_STATE_DIR: ${{ env.PICK_STATE_DIR }}
        run: npm run start:night
